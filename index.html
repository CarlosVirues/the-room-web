<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE ROOM — Political Intelligence System</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: #0A0A0A;
      color: #F5F4F1;
      font-family: 'Manrope', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hide-mobile { display: none !important; }

      /* Navbar: tighter padding so logo + R·O·O·M breathe */
      .r-nav { padding: 0 18px !important; }

      /* Hero: stack text + video */
      .r-hero { grid-template-columns: 1fr !important; height: auto !important; min-height: 0 !important; }
      .r-hero-text { padding: 96px 24px 56px !important; }
      .r-hero-text h1 { font-size: clamp(30px, 8vw, 40px) !important; }
      .r-hero-video { height: 280px !important; }
      .r-hero-scroll { display: none !important; }

      /* Generic grid collapses */
      .r-grid-2 { grid-template-columns: 1fr !important; gap: 32px !important; }
      .r-grid-3 { grid-template-columns: 1fr !important; gap: 1px !important; }
      .r-grid-4 { grid-template-columns: 1fr 1fr !important; }
      .r-grid-4 > div:nth-child(n) { border-right: none !important; }
      .r-grid-4 > div:nth-child(odd) { border-right: 1px solid rgba(245,244,241,0.08) !important; }

      /* Wrapper paddings */
      .r-section { padding: 72px 20px !important; }

      /* Section headlines slightly smaller on phone */
      .r-section h2 { font-size: clamp(28px, 8vw, 40px) !important; }

      /* Dashboard */
      .r-dash-body { grid-template-columns: 1fr !important; min-height: 0 !important; }
      .r-dash-left { border-right: none !important; border-bottom: 1px solid rgba(255,255,255,0.06) !important; }
      .r-dash-graph { flex: 0 0 240px !important; }
      .r-dash-stats { grid-template-columns: 1fr 1fr 1fr !important; }
      .r-dash-charts { grid-template-columns: 1fr !important; gap: 16px !important; }
      .r-dash-missions { grid-template-columns: 1fr !important; }
      .r-dash-missions > div:first-child { border-right: none !important; border-bottom: 1px solid rgba(255,255,255,0.06) !important; }

      /* Escalabilidad bar — stack */
      .r-escala { flex-direction: column !important; gap: 4px !important; }
      .r-escala > div { flex: none !important; }
      .r-escala > div > div { height: auto !important; padding: 18px 24px !important; }

      /* Caso phases inside mission card */
      .r-caso-phases { grid-template-columns: 1fr !important; gap: 20px !important; }
      .r-caso-card { padding: 28px 22px !important; }

      /* Diferenciador comparison: keep 2 cols but tighter padding */
      .r-compare > div { padding: 16px 18px !important; }

      /* MOVE timeline: stack vertically */
      .r-timeline { grid-template-columns: 1fr !important; }
      .r-timeline > div { min-height: 0 !important; }

      /* MOVE CTA: full width, wrap text */
      .r-move-cta { width: 100% !important; justify-content: center !important; text-align: center !important; padding: 16px 22px !important; }

      /* Modal */
      .modal-card { padding: 40px 24px !important; }
    }

    @media (max-width: 480px) {
      .r-grid-4 { grid-template-columns: 1fr !important; }
      .r-grid-4 > div { border-right: none !important; border-bottom: 1px solid rgba(245,244,241,0.08) !important; }
      .r-dash-stats { grid-template-columns: 1fr 1fr !important; }

      /* En móvil chico el menú R·O·O·M ya es la marca: ocultar wordmark del landing */
      .r-logo-landing { display: none !important; }
    }

    /* Pulse animation for live dot */
    @keyframes roomPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.65); }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0A0A0A; }
    ::-webkit-scrollbar-thumb { background: #D72631; border-radius: 2px; }

    /* Demo modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(10,10,10,0.92); backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .modal-overlay.open {
      opacity: 1; pointer-events: all;
    }
    .modal-card {
      background: #141414; border: 1px solid rgba(245,244,241,0.1);
      padding: 56px 48px; max-width: 480px; width: 100%;
      transform: translateY(20px); transition: transform 0.3s ease;
    }
    .modal-overlay.open .modal-card {
      transform: translateY(0);
    }
    input, textarea {
      background: rgba(245,244,241,0.04);
      border: 1px solid rgba(245,244,241,0.12);
      color: #F5F4F1; padding: 14px 16px; width: 100%;
      font-family: 'Manrope', sans-serif; font-size: 15px;
      outline: none; border-radius: 2px;
      transition: border-color 0.2s ease;
    }
    input:focus, textarea:focus { border-color: #D72631; }
    input::placeholder, textarea::placeholder { color: rgba(245,244,241,0.3); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Components -->
  <script type="text/babel" src="tweaks-panel.jsx?v=8"></script>
  <script type="text/babel" src="room-nav.jsx?v=8"></script>
  <script type="text/babel" src="room-hero.jsx?v=8"></script>
  <script type="text/babel" src="room-dashboard.jsx?v=8"></script>
  <script type="text/babel" src="room-sections.jsx?v=8"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#D72631",
      "bgDark": "#0A0A0A",
      "heroLayout": "left",
      "showDataWall": true,
      "fontStyle": "Space Grotesk"
    }/*EDITMODE-END*/;

    /* ── Demo Modal ── */
    function DemoModal({ open, onClose, type }) {
      const [name, setName] = useState('');
      const [org, setOrg] = useState('');
      const [email, setEmail] = useState('');
      const [sent, setSent] = useState(false);

      const handleSend = () => {
        if (!name || !email) return;
        setSent(true);
        setTimeout(() => { onClose(); setSent(false); setName(''); setOrg(''); setEmail(''); }, 2200);
      };

      const title = type === 'acceso' ? 'Solicitar acceso a la sala' : 'Solicitar demo';

      return (
        <div className={`modal-overlay${open ? ' open' : ''}`} onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal-card">
            {!sent ? (
              <>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '10px', color: '#D72631', letterSpacing: '0.25em', marginBottom: '20px' }}>THE ROOM</div>
                <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: '28px', fontWeight: 700, color: '#F5F4F1', marginBottom: '32px', lineHeight: 1.2 }}>{title}</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', marginBottom: '24px' }}>
                  <input placeholder="Nombre completo" value={name} onChange={e => setName(e.target.value)} />
                  <input placeholder="Organización / Gobierno" value={org} onChange={e => setOrg(e.target.value)} />
                  <input placeholder="Correo electrónico" type="email" value={email} onChange={e => setEmail(e.target.value)} />
                </div>
                <div style={{ display: 'flex', gap: '12px' }}>
                  <button
                    onClick={handleSend}
                    style={{
                      flex: 1, fontFamily: "'Manrope', sans-serif", fontSize: '13px', fontWeight: 700,
                      backgroundColor: '#D72631', color: '#F5F4F1', border: 'none',
                      padding: '14px 24px', cursor: 'pointer', letterSpacing: '0.08em', textTransform: 'uppercase',
                    }}
                  >Enviar solicitud</button>
                  <button
                    onClick={onClose}
                    style={{
                      fontFamily: "'Manrope', sans-serif", fontSize: '13px', fontWeight: 500,
                      backgroundColor: 'transparent', color: 'rgba(245,244,241,0.4)',
                      border: '1px solid rgba(245,244,241,0.12)', padding: '14px 20px', cursor: 'pointer',
                    }}
                  >Cancelar</button>
                </div>
              </>
            ) : (
              <div style={{ textAlign: 'center', padding: '40px 0' }}>
                <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: '24px', fontWeight: 700, color: '#F5F4F1', marginBottom: '12px' }}>Solicitud enviada.</div>
                <div style={{ fontFamily: "'Manrope', sans-serif", fontSize: '15px', color: 'rgba(245,244,241,0.5)' }}>Nos pondremos en contacto en las próximas 24 horas.</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ── Main App ── */
    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [modalOpen, setModalOpen] = useState(false);
      const [modalType, setModalType] = useState('demo');

      const openModal = (type) => { setModalType(type); setModalOpen(true); };

      // Apply accent color CSS variable
      useEffect(() => {
        document.documentElement.style.setProperty('--accent', t.accentColor);
      }, [t.accentColor]);

      return (
        <>
          <Navbar />
          <main>
            <Hero onCtaClick={openModal} />
            <SignalsDashboard />
            <SecProblema />
            <SecSolucion />
            <SecSistema />
            <SecAmplificacion />
            <SecMoveTeaser />
            <SecDiferenciador />
            <SecEntregables />
            <SecEscalabilidad />
            <SecCierre onCtaClick={openModal} />
          </main>
          <Footer />
          <DemoModal open={modalOpen} onClose={() => setModalOpen(false)} type={modalType} />

          <TweaksPanel>
            <TweakSection label="Marca" />
            <TweakColor
              label="Color acento"
              value={t.accentColor}
              options={['#D72631','#0B3D7E','#F5B400','#1A6B3A']}
              onChange={v => setTweak('accentColor', v)}
            />
            <TweakSection label="Hero" />
            <TweakToggle
              label="Data wall"
              value={t.showDataWall}
              onChange={v => setTweak('showDataWall', v)}
            />
            <TweakRadio
              label="Layout"
              value={t.heroLayout}
              options={['centered','left']}
              onChange={v => setTweak('heroLayout', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
