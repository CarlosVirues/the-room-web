<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE ROOM · CAPA 02 — OBSERVE · From signal to meaning</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: #0A0A0A;
      color: #F5F4F1;
      font-family: 'Manrope', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hide-mobile { display: none !important; }

      /* Generic grid collapses */
      .r-grid-2 { grid-template-columns: 1fr !important; gap: 32px !important; }
      .r-grid-3 { grid-template-columns: 1fr !important; gap: 1px !important; }
      .r-grid-4 { grid-template-columns: 1fr 1fr !important; }
      .r-grid-4 > div:nth-child(n) { border-right: none !important; }
      .r-grid-4 > div:nth-child(odd) { border-right: 1px solid rgba(245,244,241,0.08) !important; }

      /* Wrapper paddings */
      .r-section { padding: 72px 20px !important; }
      .r-section h2 { font-size: clamp(28px, 8vw, 40px) !important; }

      /* Comparison: keep 2 cols but tighter padding */
      .r-compare > div { padding: 16px 18px !important; }

      /* MOVE timeline: stack vertically */
      .r-timeline { grid-template-columns: 1fr !important; }
      .r-timeline > div { min-height: 0 !important; }

      /* MOVE CTA: full width, wrap text */
      .r-move-cta { width: 100% !important; justify-content: center !important; text-align: center !important; padding: 16px 22px !important; }
    }

    @media (max-width: 480px) {
      .r-grid-4 { grid-template-columns: 1fr !important; }
      .r-grid-4 > div { border-right: none !important; border-bottom: 1px solid rgba(245,244,241,0.08) !important; }
    }

    /* Pulse animation for live dot */
    @keyframes roomPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.65); }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0A0A0A; }
    ::-webkit-scrollbar-thumb { background: #D72631; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Components (only what this page needs) -->
  <script type="text/babel" src="room-nav.jsx?v=7"></script>
  <script type="text/babel" src="room-sections.jsx?v=7"></script>

  <script type="text/babel">
    const monoNav = {
      fontFamily: "'JetBrains Mono', monospace",
      letterSpacing: '0.14em', textTransform: 'uppercase',
      textDecoration: 'none', background: 'none', border: 'none', cursor: 'pointer',
    };

    function SubNav({ active }) {
      return (
        <nav style={{
          position: 'sticky', top: 0, zIndex: 100,
          height: '64px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '0 clamp(24px, 5vw, 80px)',
          backgroundColor: 'rgba(10,10,10,0.92)',
          backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)',
          borderBottom: '1px solid rgba(245,241,235,0.06)',
        }}>
          <a href="index.html" style={{ ...monoNav, color: '#F5F1EB', fontWeight: 700, fontSize: '13px', letterSpacing: '0.18em' }}>
            THE ROOM
          </a>
          <RoomMenu items={roomItems(active, true)} />
          <a href="index.html" style={{
            ...monoNav, color: 'rgba(245,241,235,0.45)', fontSize: '10px',
            display: 'inline-flex', alignItems: 'center', gap: '6px',
          }} className="hide-mobile"
            onMouseOver={e => e.currentTarget.style.color = '#F5F1EB'}
            onMouseOut={e => e.currentTarget.style.color = 'rgba(245,241,235,0.45)'}
          >← Volver</a>
        </nav>
      );
    }

    function ObservePage() {
      return (
        <>
          <SubNav active="observe" />
          <main><SecObserve /></main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ObservePage />);
  </script>
</body>
</html>
